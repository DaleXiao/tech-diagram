<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="40" fill="#111827" font-size="18" font-weight="600" text-anchor="middle">ETL Data Pipeline</text>
  <text x="500" y="60" fill="#6b7280" font-size="12" text-anchor="middle">Extract → Transform → Load → Analytics</text>
  <line x1="180" y1="280" x2="238" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="177.0" y="260.0" width="64" height="14" rx="2" fill="#ffffff" opacity="0.95"/>
  <text x="209.0" y="270.0" fill="#6b7280" font-size="11" text-anchor="middle">raw data</text>
  <line x1="360" y1="280" x2="418" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="360.5" y="260.0" width="57" height="14" rx="2" fill="#ffffff" opacity="0.95"/>
  <text x="389.0" y="270.0" fill="#6b7280" font-size="11" text-anchor="middle">cleaned</text>
  <line x1="540" y1="280" x2="598" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
