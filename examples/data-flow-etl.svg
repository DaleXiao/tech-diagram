  <text x="569.0" y="270.0" fill="#6b7280" font-size="11" text-anchor="middle">modeled</text>
  <line x1="720" y1="280" x2="778" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="727.5" y="220.0" width="43" height="14" rx="2" fill="#ffffff" opacity="0.95"/>
  <text x="749.0" y="230.0" fill="#6b7280" font-size="11" text-anchor="middle">facts</text>
  <line x1="850" y1="240" x2="850" y2="318" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="821.5" y="259.0" width="57" height="14" rx="2" fill="#ffffff" opacity="0.95"/>
  <text x="850.0" y="269.0" fill="#6b7280" font-size="11" text-anchor="middle">queries</text>
  <rect x="60" y="240" width="120" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="120.0" y="276.0" fill="#111827" font-size="14" font-weight="500" text-anchor="middle">Source DBs</text>
  <text x="120.0" y="294.0" fill="#6b7280" font-size="11" text-anchor="middle">MySQL, Mongo</text>
  <rect x="240" y="240" width="120" height="80" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
