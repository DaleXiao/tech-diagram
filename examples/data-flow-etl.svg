  <text x="300.0" y="294.0" fill="#6b7280" font-size="11" text-anchor="middle">CDC + Batch</text>
  <rect x="420" y="240" width="120" height="80" rx="8" fill="#faf5ff" stroke="#ede9fe" stroke-width="1.5"/>
  <text x="480.0" y="276.0" fill="#111827" font-size="14" font-weight="500" text-anchor="middle">Transform</text>
  <text x="480.0" y="294.0" fill="#6b7280" font-size="11" text-anchor="middle">Spark / dbt</text>
  <rect x="600" y="240" width="120" height="80" rx="8" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="660.0" y="276.0" fill="#111827" font-size="14" font-weight="500" text-anchor="middle">Load</text>
