<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <style>
    text { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d1d5db"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="32" fill="#111827" font-size="18" font-weight="500" text-anchor="middle">Authentication Sequence</text>
  <rect x="60" y="50" width="120" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="120" y="75" fill="#111827" font-size="14" font-weight="500" text-anchor="middle">Client</text>
  <text x="120" y="64" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em" text-anchor="middle"></text>
  <line x1="120" y1="90" x2="120" y2="560" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="280" y="50" width="120" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="340" y="75" fill="#111827" font-size="14" font-weight="500" text-anchor="middle">API Gateway</text>
  <text x="340" y="64" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em" text-anchor="middle"></text>
  <line x1="340" y1="90" x2="340" y2="560" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="500" y="50" width="120" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="75" fill="#111827" font-size="14" font-weight="500" text-anchor="middle">Auth Service</text>
  <text x="560" y="64" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em" text-anchor="middle"></text>
  <line x1="560" y1="90" x2="560" y2="560" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="720" y="50" width="120" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="780" y="75" fill="#111827" font-size="14" font-weight="500" text-anchor="middle">Database</text>
  <text x="780" y="64" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em" text-anchor="middle"></text>
  <line x1="780" y1="90" x2="780" y2="560" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="130" x2="340" y2="130" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="230.0" y="124" fill="#374151" font-size="12" text-anchor="middle">POST /login</text>
  <line x1="340" y1="170" x2="560" y2="170" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="450.0" y="164" fill="#374151" font-size="12" text-anchor="middle">Validate JWT</text>
  <line x1="560" y1="210" x2="780" y2="210" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="670.0" y="204" fill="#374151" font-size="12" text-anchor="middle">SELECT user</text>
  <line x1="780" y1="250" x2="560" y2="250" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="670.0" y="244" fill="#374151" font-size="12" text-anchor="middle">user record</text>
  <line x1="560" y1="290" x2="340" y2="290" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="450.0" y="284" fill="#374151" font-size="12" text-anchor="middle">JWT token</text>
  <line x1="340" y1="330" x2="120" y2="330" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="230.0" y="324" fill="#374151" font-size="12" text-anchor="middle">200 + token</text>
  <line x1="120" y1="390" x2="340" y2="390" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="230.0" y="384" fill="#374151" font-size="12" text-anchor="middle">GET /resource</text>
  <line x1="340" y1="430" x2="560" y2="430" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="450.0" y="424" fill="#374151" font-size="12" text-anchor="middle">Verify token</text>
  <line x1="560" y1="470" x2="340" y2="470" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="450.0" y="464" fill="#374151" font-size="12" text-anchor="middle">valid</text>
  <line x1="340" y1="510" x2="120" y2="510" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="230.0" y="504" fill="#374151" font-size="12" text-anchor="middle">200 + data</text>
  <rect x="334" y="125" width="12" height="215" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <rect x="554" y="165" width="12" height="135" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <rect x="774" y="205" width="12" height="50" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <rect x="334" y="385" width="12" height="135" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <rect x="554" y="425" width="12" height="50" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <rect x="80" y="370" width="740" height="160" rx="4" fill="none" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="80" y="370" width="60" height="20" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="110" y="384" fill="#9ca3af" font-size="10" font-weight="500" text-anchor="middle">AUTH</text>
</svg>